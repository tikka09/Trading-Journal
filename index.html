<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0a0e1a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="TradeLog" />
  <title>TradeLog</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Syne:wght@700;800&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    :root {
      --bg: #0a0e1a;
      --surface: #0f1829;
      --border: #1a2640;
      --green: #00d4aa;
      --red: #ff4466;
      --text: #e2e8f0;
      --muted: #3d5268;
      --accent: #00d4aa;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    html, body {
      height: 100%; background: var(--bg); color: var(--text);
      font-family: 'DM Mono', monospace; overflow: hidden;
    }

    #app {
      max-width: 430px; margin: 0 auto; height: 100vh;
      display: flex; flex-direction: column; position: relative;
      overflow: hidden;
    }

    /* HEADER */
    .header {
      padding: calc(var(--safe-top) + 14px) 20px 14px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      background: var(--bg); flex-shrink: 0; z-index: 10;
    }
    .logo { font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 800; color: var(--green); letter-spacing: -0.5px; }
    .logo span { color: var(--text); }
    .header-date { font-size: 10px; color: var(--muted); letter-spacing: 1.5px; }
    .sync-btn {
      background: none; border: 1px solid var(--border); border-radius: 8px;
      color: var(--muted); font-family: 'DM Mono', monospace;
      font-size: 10px; padding: 5px 10px; cursor: pointer; letter-spacing: 1px;
      transition: all 0.2s;
    }
    .sync-btn:hover { border-color: var(--green); color: var(--green); }
    .sync-btn.synced { border-color: var(--green); color: var(--green); }

    /* SCROLL CONTENT */
    .content {
      flex: 1; overflow-y: auto; padding-bottom: 80px;
      -webkit-overflow-scrolling: touch;
    }
    .content::-webkit-scrollbar { display: none; }

    /* CARDS */
    .capital-card {
      margin: 14px 16px;
      background: linear-gradient(135deg, #0d1f35 0%, #0f2a30 50%, #0d1f20 100%);
      border: 1px solid #00d4aa33; border-radius: 18px; padding: 22px;
      position: relative; overflow: hidden;
    }
    .capital-card::before {
      content: ''; position: absolute; top: -50px; right: -50px;
      width: 160px; height: 160px; background: #00d4aa18;
      border-radius: 50%; filter: blur(40px);
    }
    .cap-label { font-size: 9px; color: var(--muted); letter-spacing: 3px; text-transform: uppercase; }
    .cap-value { font-family: 'Syne', sans-serif; font-size: 36px; font-weight: 800; color: var(--green); margin-top: 4px; letter-spacing: -1px; }
    .cap-sub { font-size: 11px; color: var(--muted); margin-top: 6px; display: flex; gap: 10px; align-items: center; }
    .cap-sub .pnl { font-weight: 500; }
    .cap-sub .pct { background: #00d4aa15; border: 1px solid #00d4aa33; padding: 2px 8px; border-radius: 20px; font-size: 10px; }

    .stats-row { display: flex; gap: 8px; margin: 0 16px 8px; }
    .stat-box {
      flex: 1; background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; padding: 12px;
    }
    .stat-label { font-size: 8px; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 4px; }
    .stat-value { font-family: 'Syne', sans-serif; font-size: 20px; font-weight: 700; }

    .section-title {
      font-size: 9px; color: var(--muted); letter-spacing: 3px;
      text-transform: uppercase; padding: 14px 20px 8px;
    }

    /* TRADE ROWS */
    .trade-row {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 14px; padding: 14px 16px; margin: 6px 16px;
      display: flex; justify-content: space-between; align-items: center;
      cursor: pointer; transition: border-color 0.2s;
      animation: slideIn 0.3s ease;
    }
    @keyframes slideIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .trade-row:active { border-color: var(--green); transform: scale(0.98); }
    .trade-stock { font-family: 'Syne', sans-serif; font-size: 16px; font-weight: 700; }
    .trade-meta { font-size: 10px; color: var(--muted); margin-top: 3px; }
    .trade-prices { font-size: 10px; color: var(--muted); margin-top: 2px; }
    .pnl-badge {
      padding: 7px 12px; border-radius: 10px;
      font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 700;
      text-align: right;
    }
    .pnl-badge.win { background: #00d4aa15; color: var(--green); border: 1px solid #00d4aa33; }
    .pnl-badge.loss { background: #ff446615; color: var(--red); border: 1px solid #ff446633; }
    .emotion-tag { font-size: 9px; color: var(--muted); margin-top: 4px; text-align: right; }

    /* PROGRESS BAR */
    .progress-bar-wrap { margin: 4px 16px 10px; }
    .progress-bar-label { display: flex; justify-content: space-between; font-size: 9px; color: var(--muted); margin-bottom: 5px; letter-spacing: 1px; }
    .progress-bar-bg { background: var(--border); border-radius: 4px; height: 4px; overflow: hidden; }
    .progress-bar-fill { height: 100%; border-radius: 4px; background: linear-gradient(90deg, var(--green), #00b89a); transition: width 0.6s ease; }

    /* NAV BAR */
    .nav-bar {
      position: absolute; bottom: 0; left: 0; right: 0;
      background: var(--bg); border-top: 1px solid var(--border);
      display: flex; padding: 8px 0 calc(var(--safe-bottom) + 8px);
      z-index: 20;
    }
    .nav-btn {
      flex: 1; display: flex; flex-direction: column; align-items: center;
      gap: 3px; padding: 6px 0; cursor: pointer; border: none;
      background: transparent; color: var(--muted); font-family: 'DM Mono', monospace;
      font-size: 9px; letter-spacing: 1px; text-transform: uppercase; transition: color 0.2s;
    }
    .nav-btn.active { color: var(--green); }
    .nav-icon { font-size: 20px; line-height: 1; }
    .nav-add { width: 44px; height: 44px; background: var(--green); border-radius: 14px; display: flex; align-items: center; justify-content: center; font-size: 24px; color: var(--bg); font-weight: 700; box-shadow: 0 4px 20px #00d4aa40; }

    /* FORMS */
    .form-section { padding: 0 0 16px; }
    .form-group { margin: 0 16px 14px; }
    .form-label { font-size: 9px; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; display: block; margin-bottom: 7px; }
    .form-input {
      width: 100%; background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; padding: 13px 15px; color: var(--text);
      font-size: 15px; font-family: 'DM Mono', monospace; outline: none;
      transition: border-color 0.2s; -webkit-appearance: none;
    }
    .form-input:focus { border-color: var(--green); }
    .form-input::placeholder { color: var(--muted); }
    .form-row { display: flex; gap: 8px; margin: 0 16px 14px; }
    .form-row .form-group { margin: 0; flex: 1; }

    .chip-wrap { display: flex; flex-wrap: wrap; gap: 7px; }
    .chip {
      padding: 8px 14px; border-radius: 20px; font-size: 11px;
      border: 1px solid var(--border); background: var(--surface);
      color: var(--muted); cursor: pointer; font-family: 'DM Mono', monospace;
      transition: all 0.15s; letter-spacing: 0.5px;
    }
    .chip.active { border-color: var(--green); background: #00d4aa15; color: var(--green); }

    .type-row { display: flex; gap: 8px; margin: 0 16px 14px; }
    .type-btn {
      flex: 1; padding: 13px; border-radius: 12px; font-size: 12px;
      font-weight: 700; letter-spacing: 2px; cursor: pointer; border: 1px solid var(--border);
      background: var(--surface); color: var(--muted); font-family: 'DM Mono', monospace;
      transition: all 0.2s; text-transform: uppercase;
    }
    .type-btn.long.active { border-color: var(--green); background: #00d4aa15; color: var(--green); }
    .type-btn.short.active { border-color: var(--red); background: #ff446615; color: var(--red); }

    .pnl-preview {
      margin: 0 16px 14px; padding: 14px 16px; border-radius: 12px;
      animation: fadeIn 0.3s ease;
    }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .pnl-preview.win { background: #00d4aa0d; border: 1px solid #00d4aa33; }
    .pnl-preview.loss { background: #ff44660d; border: 1px solid #ff446633; }
    .pnl-preview-label { font-size: 9px; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; }
    .pnl-preview-value { font-family: 'Syne', sans-serif; font-size: 26px; font-weight: 800; margin-top: 3px; }

    textarea.form-input { min-height: 85px; resize: none; line-height: 1.5; }

    .submit-btn {
      width: calc(100% - 32px); margin: 8px 16px 0;
      background: linear-gradient(135deg, #00d4aa, #00b890);
      border: none; border-radius: 14px; padding: 17px;
      color: #0a0e1a; font-size: 13px; font-weight: 700; font-family: 'Syne', sans-serif;
      letter-spacing: 2px; text-transform: uppercase; cursor: pointer;
      box-shadow: 0 6px 24px #00d4aa35; transition: transform 0.1s, box-shadow 0.1s;
    }
    .submit-btn:active { transform: scale(0.98); box-shadow: 0 2px 12px #00d4aa35; }

    /* DETAIL VIEW */
    .detail-header {
      padding: calc(var(--safe-top) + 14px) 20px 14px;
      display: flex; align-items: center; gap: 12px;
      border-bottom: 1px solid var(--border); flex-shrink: 0;
    }
    .back-btn { background: none; border: none; color: var(--green); cursor: pointer; font-size: 22px; padding: 0; }
    .detail-stock { font-family: 'Syne', sans-serif; font-size: 22px; font-weight: 800; }
    .detail-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 4px 16px; margin: 12px 16px; }
    .detail-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 11px 0; border-bottom: 1px solid var(--border);
    }
    .detail-row:last-child { border-bottom: none; }
    .detail-key { font-size: 10px; color: var(--muted); letter-spacing: 1.5px; text-transform: uppercase; }
    .detail-val { font-size: 13px; font-weight: 500; }
    .notes-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 14px 16px; margin: 0 16px 12px; }
    .notes-label { font-size: 9px; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 8px; }
    .notes-text { font-size: 13px; color: #94a3b8; line-height: 1.65; }
    .delete-btn {
      width: calc(100% - 32px); margin: 4px 16px 20px;
      background: transparent; border: 1px solid #ff446644;
      border-radius: 12px; padding: 14px; color: var(--red);
      font-size: 12px; font-weight: 700; letter-spacing: 2px;
      text-transform: uppercase; cursor: pointer; font-family: 'DM Mono', monospace;
      transition: all 0.2s;
    }
    .delete-btn:active { background: #ff446615; }

    /* SETTINGS */
    .settings-section { padding: 0 16px 20px; }
    .settings-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 4px 16px; margin-bottom: 12px; }
    .settings-row { display: flex; justify-content: space-between; align-items: center; padding: 14px 0; border-bottom: 1px solid var(--border); cursor: pointer; }
    .settings-row:last-child { border-bottom: none; }
    .settings-row-label { font-size: 13px; }
    .settings-row-sub { font-size: 10px; color: var(--muted); margin-top: 2px; }
    .settings-arrow { color: var(--muted); font-size: 16px; }
    .settings-action-btn {
      width: 100%; background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; padding: 14px; color: var(--text); font-family: 'DM Mono', monospace;
      font-size: 12px; letter-spacing: 1px; cursor: pointer; text-align: left;
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 8px; transition: border-color 0.2s;
    }
    .settings-action-btn:hover { border-color: var(--green); }
    .settings-action-btn.danger { border-color: #ff446633; color: var(--red); }

    /* TOAST */
    .toast {
      position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
      background: var(--green); color: #0a0e1a; padding: 16px 32px;
      border-radius: 14px; font-family: 'Syne', sans-serif; font-size: 14px;
      font-weight: 800; letter-spacing: 2px; z-index: 999;
      animation: toastIn 0.2s ease; box-shadow: 0 8px 32px #00d4aa40;
    }
    .toast.error { background: var(--red); box-shadow: 0 8px 32px #ff446640; }
    @keyframes toastIn { from { opacity: 0; transform: translate(-50%, -50%) scale(0.9); } to { opacity: 1; transform: translate(-50%, -50%) scale(1); } }

    /* EMPTY STATE */
    .empty-state { text-align: center; padding: 50px 30px; color: var(--muted); }
    .empty-icon { font-size: 48px; margin-bottom: 14px; }
    .empty-text { font-size: 13px; line-height: 1.7; }

    /* CALENDAR STRIP */
    .cal-strip { display: flex; gap: 6px; overflow-x: auto; padding: 0 16px 4px; scrollbar-width: none; }
    .cal-strip::-webkit-scrollbar { display: none; }
    .cal-day {
      flex-shrink: 0; width: 44px; text-align: center; padding: 8px 4px;
      border-radius: 10px; border: 1px solid var(--border); background: var(--surface);
    }
    .cal-day.has-trade { border-color: #00d4aa44; background: #00d4aa0d; }
    .cal-day.has-loss { border-color: #ff446644; background: #ff44660d; }
    .cal-day-name { font-size: 8px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; }
    .cal-day-num { font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 700; margin-top: 2px; }
    .cal-day-dot { width: 5px; height: 5px; border-radius: 50%; margin: 4px auto 0; }
    .cal-day.has-trade .cal-day-dot { background: var(--green); }
    .cal-day.has-loss .cal-day-dot { background: var(--red); }

    .view { display: none; flex-direction: column; height: 100%; }
    .view.active { display: flex; }

    input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(0.5); }
  </style>
</head>
<body>
<div id="app">

  <!-- DASHBOARD VIEW -->
  <div class="view active" id="view-dashboard">
    <div class="header">
      <div class="logo">Trade<span>Log</span></div>
      <div class="header-date" id="header-date"></div>
    </div>
    <div class="content" id="dashboard-content">
      <!-- injected by JS -->
    </div>
    <nav class="nav-bar">
      <button class="nav-btn active" onclick="showView('dashboard')">
        <span class="nav-icon">📊</span>Home
      </button>
      <button class="nav-btn" onclick="showView('log')">
        <span class="nav-icon">📋</span>Trades
      </button>
      <button class="nav-btn" onclick="showView('add')">
        <div class="nav-add">+</div>
      </button>
      <button class="nav-btn" onclick="showView('settings')">
        <span class="nav-icon">⚙️</span>Settings
      </button>
    </nav>
  </div>

  <!-- LOG VIEW -->
  <div class="view" id="view-log">
    <div class="header">
      <div class="logo">Trade<span>Log</span></div>
      <div class="header-date">ALL TRADES</div>
    </div>
    <div class="content" id="log-content"></div>
    <nav class="nav-bar">
      <button class="nav-btn" onclick="showView('dashboard')">
        <span class="nav-icon">📊</span>Home
      </button>
      <button class="nav-btn active" onclick="showView('log')">
        <span class="nav-icon">📋</span>Trades
      </button>
      <button class="nav-btn" onclick="showView('add')">
        <div class="nav-add">+</div>
      </button>
      <button class="nav-btn" onclick="showView('settings')">
        <span class="nav-icon">⚙️</span>Settings
      </button>
    </nav>
  </div>

  <!-- ADD TRADE VIEW -->
  <div class="view" id="view-add">
    <div class="header">
      <div class="logo">Trade<span>Log</span></div>
      <div class="header-date">LOG TRADE</div>
    </div>
    <div class="content">
      <div class="form-section">
        <div style="padding: 14px 0 0;"></div>

        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Date</label>
            <input type="date" class="form-input" id="f-date" />
          </div>
          <div class="form-group">
            <label class="form-label">Stock</label>
            <input type="text" class="form-input" id="f-stock" placeholder="ONGC" autocomplete="off" autocapitalize="characters" />
          </div>
        </div>

        <div class="type-row">
          <button class="type-btn long active" id="btn-long" onclick="setType('LONG')">📈 Long</button>
          <button class="type-btn short" id="btn-short" onclick="setType('SHORT')">📉 Short</button>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Entry ₹</label>
            <input type="number" class="form-input" id="f-entry" placeholder="280.80" oninput="updatePreview()" />
          </div>
          <div class="form-group">
            <label class="form-label">Exit ₹</label>
            <input type="number" class="form-input" id="f-exit" placeholder="285.00" oninput="updatePreview()" />
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">Quantity</label>
          <input type="number" class="form-input" id="f-qty" placeholder="171" oninput="updatePreview()" />
        </div>

        <div id="pnl-preview-wrap" style="display:none;"></div>

        <div class="form-group">
          <label class="form-label">Strategy</label>
          <div class="chip-wrap" id="strategy-chips"></div>
        </div>

        <div class="form-group">
          <label class="form-label">Emotion</label>
          <div class="chip-wrap" id="emotion-chips"></div>
        </div>

        <div class="form-group">
          <label class="form-label">Notes & Lessons</label>
          <textarea class="form-input" id="f-notes" placeholder="What happened? Any lessons?"></textarea>
        </div>

        <button class="submit-btn" onclick="addTrade()">+ LOG THIS TRADE</button>
        <div style="height: 20px;"></div>
      </div>
    </div>
    <nav class="nav-bar">
      <button class="nav-btn" onclick="showView('dashboard')">
        <span class="nav-icon">📊</span>Home
      </button>
      <button class="nav-btn" onclick="showView('log')">
        <span class="nav-icon">📋</span>Trades
      </button>
      <button class="nav-btn active" onclick="showView('add')">
        <div class="nav-add" style="background: #00d4aa88;">+</div>
      </button>
      <button class="nav-btn" onclick="showView('settings')">
        <span class="nav-icon">⚙️</span>Settings
      </button>
    </nav>
  </div>

  <!-- DETAIL VIEW -->
  <div class="view" id="view-detail">
    <div class="detail-header">
      <button class="back-btn" onclick="showView('log')">←</button>
      <div>
        <div class="detail-stock" id="detail-stock"></div>
        <div style="font-size:10px; color:var(--muted); margin-top:2px;" id="detail-sub"></div>
      </div>
      <div id="detail-pnl" style="margin-left:auto;"></div>
    </div>
    <div class="content" id="detail-content"></div>
  </div>

  <!-- SETTINGS VIEW -->
  <div class="view" id="view-settings">
    <div class="header">
      <div class="logo">Trade<span>Log</span></div>
      <div class="header-date">SETTINGS</div>
    </div>
    <div class="content" id="settings-content"></div>
    <nav class="nav-bar">
      <button class="nav-btn" onclick="showView('dashboard')">
        <span class="nav-icon">📊</span>Home
      </button>
      <button class="nav-btn" onclick="showView('log')">
        <span class="nav-icon">📋</span>Trades
      </button>
      <button class="nav-btn" onclick="showView('add')">
        <div class="nav-add">+</div>
      </button>
      <button class="nav-btn active" onclick="showView('settings')">
        <span class="nav-icon">⚙️</span>Settings
      </button>
    </nav>
  </div>
</div>

<script>
// ─── DATA ───────────────────────────────────────────────────────────────────
const INITIAL_CAPITAL = 10000;
const STRATEGIES = ["Gap & Momentum","Breakout","Reversal","Scalping","News-Based","Support/Resistance","Other"];
const EMOTIONS = ["Confident","Calm","Nervous","Fearful","Greedy","Neutral","FOMO"];

let trades = [];
let currentType = "LONG";
let selectedStrategy = "Gap & Momentum";
let selectedEmotion = "Neutral";
let selectedTradeId = null;

function loadData() {
  try {
    const saved = localStorage.getItem("tradelog_v2");
    if (saved) trades = JSON.parse(saved);
    else trades = [{
      id: 1741070400000, date: "2026-03-04", stock: "ONGC",
      entry: 280.80, exit: 281.55, qty: 171, type: "LONG",
      strategy: "Gap & Momentum", emotion: "Nervous",
      notes: "First real trade on a market crash day (US-Iran conflict). Accidental SL trigger while trying to modify SL on Upstox — tapped sell instead of edit. Lesson: Always use the pencil/edit icon, never the sell button to modify SL."
    }];
  } catch(e) { trades = []; }
}

function saveData() {
  try { localStorage.setItem("tradelog_v2", JSON.stringify(trades)); } catch(e) {}
}

function calcPnl(t) {
  return (t.type === "LONG" ? 1 : -1) * (t.exit - t.entry) * t.qty;
}

function fmt(n) {
  if (isNaN(n)) return "0.00";
  return Math.abs(n).toLocaleString("en-IN", { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

function fmtSigned(n) {
  return (n >= 0 ? "+" : "-") + "₹" + fmt(n);
}

// ─── VIEWS ──────────────────────────────────────────────────────────────────
function showView(name) {
  document.querySelectorAll(".view").forEach(v => v.classList.remove("active"));
  document.getElementById("view-" + name).classList.add("active");
  if (name === "dashboard") renderDashboard();
  if (name === "log") renderLog();
  if (name === "settings") renderSettings();
  if (name === "add") initAddForm();
  window.scrollTo(0, 0);
}

// ─── DASHBOARD ──────────────────────────────────────────────────────────────
function renderDashboard() {
  const totalPnl = trades.reduce((s, t) => s + calcPnl(t), 0);
  const capital = INITIAL_CAPITAL + totalPnl;
  const wins = trades.filter(t => calcPnl(t) > 0).length;
  const losses = trades.filter(t => calcPnl(t) < 0).length;
  const winRate = trades.length ? Math.round((wins / trades.length) * 100) : 0;
  const growth = ((totalPnl / INITIAL_CAPITAL) * 100).toFixed(2);
  const pnlColor = totalPnl >= 0 ? "var(--green)" : "var(--red)";

  // Calendar last 7 days
  const days = ["SUN","MON","TUE","WED","THU","FRI","SAT"];
  let calHTML = '<div class="section-title">THIS WEEK</div><div class="cal-strip">';
  for (let i = 6; i >= 0; i--) {
    const d = new Date(); d.setDate(d.getDate() - i);
    const ds = d.toISOString().split("T")[0];
    const dayTrades = trades.filter(t => t.date === ds);
    const dayPnl = dayTrades.reduce((s, t) => s + calcPnl(t), 0);
    let cls = dayTrades.length ? (dayPnl >= 0 ? "has-trade" : "has-loss") : "";
    calHTML += `<div class="cal-day ${cls}">
      <div class="cal-day-name">${days[d.getDay()]}</div>
      <div class="cal-day-num">${d.getDate()}</div>
      <div class="cal-day-dot"></div>
    </div>`;
  }
  calHTML += '</div>';

  const recentHTML = trades.length === 0 ? `
    <div class="empty-state">
      <div class="empty-icon">📈</div>
      <div class="empty-text">No trades yet.<br/>Tap + to log your first trade!</div>
    </div>` :
    trades.slice(0, 4).map(t => {
      const pnl = calcPnl(t);
      return `<div class="trade-row" onclick="openDetail(${t.id})">
        <div>
          <div class="trade-stock">${t.stock}</div>
          <div class="trade-meta">${t.date} · ${t.type} · ${t.qty} QTY</div>
        </div>
        <div>
          <div class="pnl-badge ${pnl >= 0 ? 'win' : 'loss'}">${fmtSigned(pnl)}</div>
          <div class="emotion-tag">${t.emotion}</div>
        </div>
      </div>`;
    }).join("") + (trades.length > 4 ? `<div style="text-align:center;padding:8px 0;color:var(--muted);font-size:11px;cursor:pointer;" onclick="showView('log')">View all ${trades.length} trades →</div>` : "");

  const bestPnl = trades.length ? Math.max(...trades.map(t => calcPnl(t))) : 0;
  const worstPnl = trades.length ? Math.min(...trades.map(t => calcPnl(t))) : 0;
  const bestTrade = trades.find(t => calcPnl(t) === bestPnl);
  const worstTrade = trades.find(t => calcPnl(t) === worstPnl);

  document.getElementById("dashboard-content").innerHTML = `
    <div class="capital-card">
      <div class="cap-label">Current Capital</div>
      <div class="cap-value">₹${fmt(capital)}</div>
      <div class="cap-sub">
        <span>Started ₹${fmt(INITIAL_CAPITAL)}</span>
        <span class="pnl" style="color:${pnlColor}">${fmtSigned(totalPnl)}</span>
        <span class="pct" style="color:${pnlColor};border-color:${pnlColor}44;background:${pnlColor}11;">${growth}%</span>
      </div>
    </div>

    <div class="progress-bar-wrap">
      <div class="progress-bar-label"><span>GOAL: ₹20,000</span><span>${((capital/20000)*100).toFixed(1)}% there</span></div>
      <div class="progress-bar-bg"><div class="progress-bar-fill" style="width:${Math.min((capital/20000)*100,100)}%"></div></div>
    </div>

    <div class="stats-row">
      <div class="stat-box">
        <div class="stat-label">Trades</div>
        <div class="stat-value" style="color:var(--text)">${trades.length}</div>
      </div>
      <div class="stat-box">
        <div class="stat-label">Win Rate</div>
        <div class="stat-value" style="color:${winRate >= 50 ? 'var(--green)' : 'var(--red)'}">${winRate}%</div>
      </div>
      <div class="stat-box">
        <div class="stat-label">W / L</div>
        <div class="stat-value" style="color:var(--text)">${wins}/${losses}</div>
      </div>
    </div>

    ${trades.length > 0 ? `<div class="stats-row">
      <div class="stat-box">
        <div class="stat-label">Best Trade</div>
        <div style="font-size:13px;font-weight:700;color:var(--green);margin-top:3px;">${bestTrade?.stock || '-'}</div>
        <div style="font-size:12px;color:var(--green);">+₹${fmt(bestPnl)}</div>
      </div>
      <div class="stat-box">
        <div class="stat-label">Worst Trade</div>
        <div style="font-size:13px;font-weight:700;color:var(--red);margin-top:3px;">${worstTrade?.stock || '-'}</div>
        <div style="font-size:12px;color:var(--red);">${fmtSigned(worstPnl)}</div>
      </div>
    </div>` : ''}

    ${calHTML}
    <div class="section-title">RECENT TRADES</div>
    ${recentHTML}
    <div style="height:10px;"></div>
  `;

  document.getElementById("header-date").textContent = new Date().toLocaleDateString("en-IN", { day: "numeric", month: "short", year: "numeric" }).toUpperCase();
}

// ─── LOG ────────────────────────────────────────────────────────────────────
function renderLog() {
  if (trades.length === 0) {
    document.getElementById("log-content").innerHTML = `
      <div class="section-title">ALL TRADES (0)</div>
      <div class="empty-state"><div class="empty-icon">📋</div><div class="empty-text">No trades yet.<br/>Tap + to add your first one!</div></div>`;
    return;
  }
  const html = `<div class="section-title">ALL TRADES (${trades.length})</div>` +
    trades.map(t => {
      const pnl = calcPnl(t);
      return `<div class="trade-row" onclick="openDetail(${t.id})">
        <div>
          <div class="trade-stock">${t.stock}</div>
          <div class="trade-meta">${t.date} · ${t.type} · ${t.qty} QTY</div>
          <div class="trade-prices">₹${fmt(t.entry)} → ₹${fmt(t.exit)}</div>
        </div>
        <div>
          <div class="pnl-badge ${pnl >= 0 ? 'win' : 'loss'}">${fmtSigned(pnl)}</div>
          <div class="emotion-tag">${t.strategy}</div>
        </div>
      </div>`;
    }).join("") + '<div style="height:10px;"></div>';
  document.getElementById("log-content").innerHTML = html;
}

// ─── DETAIL ─────────────────────────────────────────────────────────────────
function openDetail(id) {
  const t = trades.find(x => x.id === id);
  if (!t) return;
  selectedTradeId = id;
  const pnl = calcPnl(t);
  const isWin = pnl >= 0;

  document.getElementById("detail-stock").textContent = t.stock;
  document.getElementById("detail-sub").textContent = `${t.date} · ${t.type}`;
  document.getElementById("detail-pnl").innerHTML = `<div class="pnl-badge ${isWin ? 'win' : 'loss'}" style="font-size:15px;">${fmtSigned(pnl)}</div>`;

  const move = ((Math.abs(t.exit - t.entry) / t.entry) * 100).toFixed(2);
  const rows = [
    ["Entry", `₹${fmt(t.entry)}`],
    ["Exit", `₹${fmt(t.exit)}`],
    ["Quantity", t.qty],
    ["Move", `₹${fmt(Math.abs(t.exit - t.entry))} (${move}%)`],
    ["Strategy", t.strategy],
    ["Emotion", t.emotion],
    ["Gross P&L", `<span style="color:${isWin ? 'var(--green)' : 'var(--red)'};font-weight:700;">${fmtSigned(pnl)}</span>`],
  ];

  document.getElementById("detail-content").innerHTML = `
    <div class="detail-card">
      ${rows.map(([k,v]) => `<div class="detail-row"><div class="detail-key">${k}</div><div class="detail-val">${v}</div></div>`).join("")}
    </div>
    ${t.notes ? `<div class="notes-card"><div class="notes-label">Notes & Lessons</div><div class="notes-text">${t.notes}</div></div>` : ""}
    <button class="delete-btn" onclick="deleteTrade(${id})">🗑 Delete This Trade</button>
    <div style="height:20px;"></div>
  `;

  showView("detail");
}

function deleteTrade(id) {
  if (!confirm("Delete this trade?")) return;
  trades = trades.filter(t => t.id !== id);
  saveData();
  showToast("TRADE DELETED");
  showView("log");
}

// ─── ADD FORM ───────────────────────────────────────────────────────────────
function initAddForm() {
  document.getElementById("f-date").value = new Date().toISOString().split("T")[0];
  document.getElementById("f-stock").value = "";
  document.getElementById("f-entry").value = "";
  document.getElementById("f-exit").value = "";
  document.getElementById("f-qty").value = "";
  document.getElementById("f-notes").value = "";
  currentType = "LONG";
  selectedStrategy = "Gap & Momentum";
  selectedEmotion = "Neutral";
  updateTypeButtons();
  document.getElementById("pnl-preview-wrap").style.display = "none";

  const sc = document.getElementById("strategy-chips");
  sc.innerHTML = STRATEGIES.map(s => `<div class="chip ${s === selectedStrategy ? 'active' : ''}" onclick="selectStrategy('${s}')">${s}</div>`).join("");

  const ec = document.getElementById("emotion-chips");
  ec.innerHTML = EMOTIONS.map(e => `<div class="chip ${e === selectedEmotion ? 'active' : ''}" onclick="selectEmotion('${e}')">${e}</div>`).join("");
}

function setType(t) {
  currentType = t;
  updateTypeButtons();
  updatePreview();
}

function updateTypeButtons() {
  document.getElementById("btn-long").className = `type-btn long ${currentType === 'LONG' ? 'active' : ''}`;
  document.getElementById("btn-short").className = `type-btn short ${currentType === 'SHORT' ? 'active' : ''}`;
}

function selectStrategy(s) {
  selectedStrategy = s;
  document.querySelectorAll("#strategy-chips .chip").forEach(c => {
    c.className = "chip" + (c.textContent === s ? " active" : "");
  });
}

function selectEmotion(e) {
  selectedEmotion = e;
  document.querySelectorAll("#emotion-chips .chip").forEach(c => {
    c.className = "chip" + (c.textContent === e ? " active" : "");
  });
}

function updatePreview() {
  const entry = parseFloat(document.getElementById("f-entry").value);
  const exit = parseFloat(document.getElementById("f-exit").value);
  const qty = parseInt(document.getElementById("f-qty").value);
  const wrap = document.getElementById("pnl-preview-wrap");
  if (!entry || !exit || !qty) { wrap.style.display = "none"; return; }
  const pnl = (currentType === "LONG" ? 1 : -1) * (exit - entry) * qty;
  const isWin = pnl >= 0;
  wrap.style.display = "block";
  wrap.innerHTML = `<div class="pnl-preview ${isWin ? 'win' : 'loss'}">
    <div class="pnl-preview-label">ESTIMATED P&L</div>
    <div class="pnl-preview-value" style="color:${isWin ? 'var(--green)' : 'var(--red)'};">${fmtSigned(pnl)}</div>
  </div>`;
}

function addTrade() {
  const date = document.getElementById("f-date").value;
  const stock = document.getElementById("f-stock").value.trim().toUpperCase();
  const entry = parseFloat(document.getElementById("f-entry").value);
  const exit = parseFloat(document.getElementById("f-exit").value);
  const qty = parseInt(document.getElementById("f-qty").value);
  const notes = document.getElementById("f-notes").value.trim();

  if (!stock || !entry || !exit || !qty) { showToast("FILL ALL FIELDS", true); return; }

  trades.unshift({ id: Date.now(), date, stock, entry, exit, qty, type: currentType, strategy: selectedStrategy, emotion: selectedEmotion, notes });
  saveData();
  showToast("✓ TRADE LOGGED!");
  setTimeout(() => showView("dashboard"), 1200);
}

// ─── SETTINGS ───────────────────────────────────────────────────────────────
function renderSettings() {
  const total = trades.length;
  const totalPnl = trades.reduce((s, t) => s + calcPnl(t), 0);
  document.getElementById("settings-content").innerHTML = `
    <div class="section-title">DATA</div>
    <div class="settings-section">
      <button class="settings-action-btn" onclick="exportData()">
        <span>📤 Export to JSON (save to Drive)</span><span class="settings-arrow">→</span>
      </button>
      <button class="settings-action-btn" onclick="importData()">
        <span>📥 Import from JSON (restore from Drive)</span><span class="settings-arrow">→</span>
      </button>
    </div>

    <div class="section-title">STATS</div>
    <div class="settings-card">
      ${[
        ["Total Trades", total],
        ["Initial Capital", "₹" + fmt(INITIAL_CAPITAL)],
        ["Total P&L", fmtSigned(totalPnl)],
        ["Current Capital", "₹" + fmt(INITIAL_CAPITAL + totalPnl)],
      ].map(([k,v]) => `<div class="detail-row"><div class="detail-key">${k}</div><div class="detail-val">${v}</div></div>`).join("")}
    </div>

    <div class="section-title">DANGER ZONE</div>
    <div style="padding: 0 16px;">
      <button class="settings-action-btn danger" onclick="clearAllData()">
        <span>🗑 Clear All Trade Data</span><span>→</span>
      </button>
    </div>

    <div style="text-align:center;padding:24px 20px;color:var(--muted);font-size:10px;line-height:1.8;letter-spacing:1px;">
      TRADELOG PWA v1.0<br/>
      DATA STORED LOCALLY ON YOUR DEVICE<br/>
      EXPORT REGULARLY TO GOOGLE DRIVE
    </div>
  `;
}

// ─── DRIVE BACKUP ───────────────────────────────────────────────────────────
function exportData() {
  const data = JSON.stringify({ version: 2, exportedAt: new Date().toISOString(), trades }, null, 2);
  const blob = new Blob([data], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = `tradelog-backup-${new Date().toISOString().split("T")[0]}.json`;
  a.click(); URL.revokeObjectURL(url);
  showToast("📤 EXPORTED!");
}

function importData() {
  const input = document.createElement("input");
  input.type = "file"; input.accept = ".json";
  input.onchange = e => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        const parsed = JSON.parse(ev.target.result);
        const imported = parsed.trades || parsed;
        if (!Array.isArray(imported)) throw new Error("Invalid format");
        if (confirm(`Import ${imported.length} trades? This will REPLACE your current data.`)) {
          trades = imported;
          saveData();
          showToast(`✓ ${imported.length} TRADES IMPORTED`);
          renderSettings();
        }
      } catch(err) { showToast("INVALID FILE", true); }
    };
    reader.readAsText(file);
  };
  input.click();
}

function clearAllData() {
  if (!confirm("⚠️ Delete ALL trade data? This cannot be undone!")) return;
  trades = [];
  saveData();
  showToast("ALL DATA CLEARED");
  showView("dashboard");
}

// ─── TOAST ──────────────────────────────────────────────────────────────────
let toastTimer = null;
function showToast(msg, isError = false) {
  const existing = document.querySelector(".toast");
  if (existing) existing.remove();
  const t = document.createElement("div");
  t.className = "toast" + (isError ? " error" : "");
  t.textContent = msg;
  document.body.appendChild(t);
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.remove(), 1800);
}

// ─── INIT ────────────────────────────────────────────────────────────────────
loadData();
renderDashboard();

// Service Worker
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("/sw.js").catch(() => {});
}
</script>
